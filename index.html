<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java — Quiz Egzaminacyjny</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --surface2: #1a1e28;
    --border: #252a38;
    --accent: #f97316;
    --accent2: #fb923c;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  /* HEADER */
  header {
    position: relative; z-index: 10;
    padding: 3rem 2rem 2rem;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0d0f14 0%, transparent 100%);
    text-align: center;
  }

  header .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 0.25rem 0.75rem;
    border-radius: 2px;
    margin-bottom: 1.25rem;
  }

  header h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.05;
  }

  header h1 span { color: var(--accent); }

  header p {
    margin-top: 0.75rem;
    color: var(--muted);
    font-size: 0.95rem;
    font-family: var(--mono);
  }

  /* CONTROLS */
  .controls {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,15,20,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0.85rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
    gap: 1rem; flex-wrap: wrap;
  }

  .progress-wrap { display: flex; align-items: center; gap: 0.75rem; flex: 1; min-width: 200px; }
  .progress-bar-bg { flex: 1; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width 0.3s ease; }
  .progress-label { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); white-space: nowrap; }

  .btn {
    font-family: var(--sans); font-weight: 600; font-size: 0.85rem;
    padding: 0.5rem 1.2rem; border-radius: 4px; cursor: pointer;
    border: 1px solid; transition: all 0.15s ease;
  }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #000; }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
  .btn-outline { background: transparent; border-color: var(--border); color: var(--text); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-block { width: 100%; }

  /* QUIZ STAGE (one question at a time) */
  .quiz-stage {
    position: relative; z-index: 1;
    max-width: 700px; margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.75rem;
    position: relative; overflow: hidden;
  }

  .question-card::before {
    content: '';
    position: absolute; top: 0; left: 0; bottom: 0; width: 3px;
    background: var(--border); border-radius: 99px;
  }
  .question-card.correct::before { background: var(--green); }
  .question-card.incorrect::before { background: var(--red); }

  .question-number {
    font-family: var(--mono); font-size: 0.65rem; color: var(--accent);
    margin-bottom: 0.6rem; display: flex; align-items: center; gap: 0.5rem;
  }
  .question-number span { color: var(--muted); }

  .question-text {
    font-size: 1.05rem; font-weight: 600; margin-bottom: 1rem;
    color: var(--text); line-height: 1.5;
  }

  .question-meta {
    font-family: var(--mono); font-size: 0.65rem; color: var(--muted);
    margin-bottom: 0.75rem;
  }
  .question-meta.multi { color: var(--accent2); }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 0.4rem; }

  .option {
    display: flex; align-items: flex-start; gap: 0.75rem;
    padding: 0.6rem 0.9rem; border-radius: 5px;
    border: 1px solid transparent; cursor: pointer;
    transition: all 0.15s; background: var(--surface2);
    font-size: 0.9rem; line-height: 1.5;
  }

  .option:hover:not(.disabled) { border-color: var(--accent); background: rgba(249,115,22,0.06); }

  .option input[type="checkbox"],
  .option input[type="radio"] {
    width: 15px; height: 15px; margin-top: 2px; flex-shrink: 0;
    accent-color: var(--accent); cursor: pointer;
  }

  .option.selected:not(.show-result) { border-color: var(--accent); background: rgba(249,115,22,0.1); }
  .option.show-result.correct-answer { border-color: var(--green) !important; background: rgba(34,197,94,0.1) !important; }
  .option.show-result.wrong-selected { border-color: var(--red) !important; background: rgba(239,68,68,0.1) !important; }
  .option.disabled { cursor: default; }

  /* MATCHING */
  .match-row { margin-bottom: 0.9rem; }
  .match-row .pkg-label {
    font-family: var(--mono); font-size: 0.8rem; color: var(--accent);
    margin-bottom: 0.4rem;
  }
  .match-row.correct-row .pkg-label { color: var(--green); }
  .match-row.incorrect-row .pkg-label { color: var(--red); }

  /* FEEDBACK */
  .feedback-banner {
    margin-top: 1.1rem; padding: 0.75rem 1rem; border-radius: 6px;
    font-family: var(--mono); font-size: 0.85rem; font-weight: 600;
  }
  .feedback-banner.correct { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }
  .feedback-banner.incorrect { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }

  .action-row { margin-top: 1.25rem; display: flex; justify-content: flex-end; }

  /* RESULT SECTION */
  #result-section {
    display: none; position: relative; z-index: 1;
    max-width: 700px; margin: 0 auto 4rem;
    padding: 0 1.5rem;
  }
  #result-section.visible { display: block; }

  .result-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 2.5rem; text-align: center;
  }

  .result-score {
    font-size: 5rem; font-weight: 800; line-height: 1;
    color: var(--accent); font-family: var(--mono);
    margin-bottom: 0.5rem;
  }

  .result-label { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }

  .result-stats {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;
    margin-bottom: 1.75rem;
  }

  .stat-box {
    background: var(--surface2); border-radius: 8px;
    padding: 1rem; border: 1px solid var(--border);
  }
  .stat-box .stat-num { font-family: var(--mono); font-size: 1.8rem; font-weight: 700; }
  .stat-box .stat-lbl { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }
  .stat-box.good .stat-num { color: var(--green); }
  .stat-box.bad .stat-num { color: var(--red); }

  .retry-msg {
    font-family: var(--mono); font-size: 0.85rem; color: var(--green);
    margin-bottom: 1rem;
  }

  /* SCROLLTOP */
  #scrolltop {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 200;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #000; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(249,115,22,0.4);
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  #scrolltop.visible { opacity: 1; pointer-events: all; }

  @media (max-width: 600px) {
    .controls { gap: 0.5rem; }
  }
</style>
</head>
<body>

<header>
  <div class="tag" id="modeTag">Egzamin // Programowanie</div>
  <h1>Java <span>Quiz</span></h1>
  <p>135 pytań &nbsp;·&nbsp; jedno pytanie na raz &nbsp;·&nbsp; losowa kolejność pytań i odpowiedzi</p>
</header>

<div class="controls">
  <div class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">1 / 135</div>
  </div>
  <button class="btn btn-outline" id="restartBtn">Zacznij od nowa</button>
</div>

<div id="quizStage" class="quiz-stage"></div>

<div id="result-section">
  <div class="result-card">
    <div class="result-score" id="scoreNum">—</div>
    <div class="result-label" id="resultLabel">wynik końcowy</div>
    <div class="result-stats">
      <div class="stat-box good"><div class="stat-num" id="correctCount">0</div><div class="stat-lbl">Poprawnych</div></div>
      <div class="stat-box bad"><div class="stat-num" id="incorrectCount">0</div><div class="stat-lbl">Błędnych</div></div>
    </div>
    <div id="retryWrap"></div>
    <button class="btn btn-outline btn-block" id="resetBtn2">Zacznij od nowa</button>
  </div>
</div>

<button id="scrolltop" title="Na górę">↑</button>

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let roundQuestions = [];   // przygotowane (przelosowane) pytania bieżącej rundy
let currentPos = 0;        // indeks aktualnego pytania w rundzie
let mode = 'main';         // 'main' | 'retry'
let stats = { correct: 0, incorrect: 0 };
let wrongQids = new Set();        // pula pytań do powtórki (z indeksami z tablicy questions)
let wrongQidsThisRound = new Set();
let checked = false;
let currentSelection = null;      // string | Set<string> | {pkg: Set<string>} w zależności od typu

// elementy aktualnie renderowanych opcji — pozwala uniknąć wyszukiwania po CSS-selectorach
let currentOptionEls = [];        // [{el, value}] dla tf/single/multi
let currentMatchRows = {};        // { pkg: { rowEl, items: [{el, value}] } }

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function sameSet(a, b) {
  if (a.length !== b.length) return false;
  const sa = [...a].sort().join('|');
  const sb = [...b].sort().join('|');
  return sa === sb;
}

function buildRoundQuestion(qid) {
  const q = questions[qid];
  const rq = { qid, set: q.set, n: q.n, text: q.text, type: q.type, correct: q.correct };

  if (q.type === 'tf') {
    rq.options = shuffle(['Prawda', 'Fałsz']);
  } else if (q.type === 'single' || q.type === 'multi') {
    rq.options = shuffle(q.options);
  } else if (q.type === 'match') {
    rq.pkgOrder = shuffle(q.pairs.map(p => p.pkg));
    rq.itemsOrder = shuffle(q.pairs.flatMap(p => p.correct));
    rq.pairsByPkg = {};
    q.pairs.forEach(p => { rq.pairsByPkg[p.pkg] = p.correct; });
  }
  return rq;
}

// ─────────────────────────────────────────────
// ROUND CONTROL
// ─────────────────────────────────────────────
function startRound(qids, roundMode) {
  mode = roundMode;
  roundQuestions = shuffle(qids).map(buildRoundQuestion);
  currentPos = 0;
  stats = { correct: 0, incorrect: 0 };
  wrongQidsThisRound = new Set();

  document.getElementById('result-section').classList.remove('visible');
  document.getElementById('modeTag').textContent =
    roundMode === 'retry' ? 'Powtórka błędnych odpowiedzi' : 'Egzamin // Programowanie';

  showQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restartAll() {
  wrongQids = new Set();
  startRound(questions.map((_, i) => i), 'main');
}

function nextQuestion() {
  currentPos++;
  showQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─────────────────────────────────────────────
// RENDER — single question view
// ─────────────────────────────────────────────
function showQuestion() {
  if (currentPos >= roundQuestions.length) { showSummary(); return; }

  checked = false;
  currentOptionEls = [];
  currentMatchRows = {};

  const rq = roundQuestions[currentPos];
  currentSelection = (rq.type === 'match') ? {} : (rq.type === 'multi' ? new Set() : null);

  updateProgressUI();

  const stage = document.getElementById('quizStage');
  stage.innerHTML = '';

  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = 'activeCard';

  const num = document.createElement('div');
  num.className = 'question-number';
  num.innerHTML = `${rq.set.toUpperCase()} — Q${rq.n} <span>#${currentPos + 1} / ${roundQuestions.length}</span>`;

  const text = document.createElement('div');
  text.className = 'question-text';
  text.textContent = rq.text;

  card.appendChild(num);
  card.appendChild(text);

  const meta = document.createElement('div');
  if (rq.type === 'tf') {
    meta.className = 'question-meta';
    meta.textContent = 'Prawda / Fałsz';
  } else if (rq.type === 'single') {
    meta.className = 'question-meta';
    meta.textContent = 'Jedna poprawna odpowiedź';
  } else if (rq.type === 'multi') {
    meta.className = 'question-meta multi';
    meta.textContent = '▸ Wielokrotny wybór — zaznacz wszystkie poprawne, potem sprawdź';
  } else if (rq.type === 'match') {
    meta.className = 'question-meta';
    meta.textContent = 'Dopasowanie — zaznacz poprawne elementy dla każdego pakietu, potem sprawdź';
  }
  card.appendChild(meta);

  card.appendChild(rq.type === 'match' ? renderMatch(rq) : renderOptions(rq));

  const actionRow = document.createElement('div');
  actionRow.className = 'action-row';
  actionRow.id = 'actionRow';
  card.appendChild(actionRow);

  stage.appendChild(card);

  if (rq.type === 'multi' || rq.type === 'match') {
    renderCheckButton();
  }
}

function renderOptions(rq) {
  const wrap = document.createElement('div');
  wrap.className = 'options';
  const isRadio = (rq.type === 'tf' || rq.type === 'single');

  rq.options.forEach(opt => {
    const label = document.createElement('label');
    label.className = 'option';

    const inp = document.createElement('input');
    inp.type = isRadio ? 'radio' : 'checkbox';
    inp.name = 'currentQ';
    inp.value = opt;

    inp.addEventListener('change', () => {
      if (checked) return;
      if (isRadio) {
        currentSelection = opt;
        currentOptionEls.forEach(o => o.el.classList.remove('selected'));
        label.classList.add('selected');
        checkAnswer(); // tf/single: ocena natychmiast po kliknięciu
      } else {
        if (inp.checked) { currentSelection.add(opt); label.classList.add('selected'); }
        else { currentSelection.delete(opt); label.classList.remove('selected'); }
      }
    });

    const span = document.createElement('span');
    span.textContent = opt;

    label.appendChild(inp);
    label.appendChild(span);
    wrap.appendChild(label);

    currentOptionEls.push({ el: label, value: opt });
  });

  return wrap;
}

function renderMatch(rq) {
  const wrap = document.createElement('div');

  rq.pkgOrder.forEach(pkg => {
    const row = document.createElement('div');
    row.className = 'match-row';

    const pkgLabel = document.createElement('div');
    pkgLabel.className = 'pkg-label';
    pkgLabel.textContent = pkg + ' →';
    row.appendChild(pkgLabel);

    const optWrap = document.createElement('div');
    optWrap.className = 'options';

    currentMatchRows[pkg] = { rowEl: row, items: [] };

    rq.itemsOrder.forEach(item => {
      const label = document.createElement('label');
      label.className = 'option';

      const inp = document.createElement('input');
      inp.type = 'checkbox';
      inp.name = `match-${pkg}`;
      inp.value = item;

      inp.addEventListener('change', () => {
        if (checked) return;
        if (!currentSelection[pkg]) currentSelection[pkg] = new Set();
        if (inp.checked) { currentSelection[pkg].add(item); label.classList.add('selected'); }
        else { currentSelection[pkg].delete(item); label.classList.remove('selected'); }
      });

      const span = document.createElement('span');
      span.textContent = item;

      label.appendChild(inp);
      label.appendChild(span);
      optWrap.appendChild(label);

      currentMatchRows[pkg].items.push({ el: label, value: item });
    });

    row.appendChild(optWrap);
    wrap.appendChild(row);
  });

  return wrap;
}

function renderCheckButton() {
  const actionRow = document.getElementById('actionRow');
  actionRow.innerHTML = '';
  const btn = document.createElement('button');
  btn.className = 'btn btn-primary';
  btn.textContent = 'Sprawdź odpowiedź';
  btn.addEventListener('click', checkAnswer);
  actionRow.appendChild(btn);
}

// ─────────────────────────────────────────────
// CHECK ANSWER
// ─────────────────────────────────────────────
function checkAnswer() {
  if (checked) return;
  const rq = roundQuestions[currentPos];
  let isCorrect = false;

  if (rq.type === 'tf' || rq.type === 'single') {
    isCorrect = currentSelection != null && rq.correct.includes(currentSelection);
    currentOptionEls.forEach(({ el, value }) => {
      el.classList.add('show-result', 'disabled');
      el.querySelector('input').disabled = true;
      if (rq.correct.includes(value)) el.classList.add('correct-answer');
      else if (value === currentSelection) el.classList.add('wrong-selected');
    });
  } else if (rq.type === 'multi') {
    const sel = [...currentSelection];
    isCorrect = sameSet(sel, rq.correct);
    currentOptionEls.forEach(({ el, value }) => {
      el.classList.add('show-result', 'disabled');
      el.querySelector('input').disabled = true;
      const isSel = sel.includes(value);
      const isCor = rq.correct.includes(value);
      if (isCor) el.classList.add('correct-answer');
      else if (isSel) el.classList.add('wrong-selected');
    });
  } else if (rq.type === 'match') {
    isCorrect = true;
    rq.pkgOrder.forEach(pkg => {
      const sel = currentSelection[pkg] ? [...currentSelection[pkg]] : [];
      const cor = rq.pairsByPkg[pkg];
      const rowOk = sameSet(sel, cor);
      if (!rowOk) isCorrect = false;

      const rowData = currentMatchRows[pkg];
      rowData.rowEl.classList.add(rowOk ? 'correct-row' : 'incorrect-row');
      rowData.items.forEach(({ el, value }) => {
        el.classList.add('show-result', 'disabled');
        el.querySelector('input').disabled = true;
        const isSel = sel.includes(value);
        const isCor = cor.includes(value);
        if (isCor) el.classList.add('correct-answer');
        else if (isSel) el.classList.add('wrong-selected');
      });
    });
  }

  checked = true;

  const card = document.getElementById('activeCard');
  card.classList.add(isCorrect ? 'correct' : 'incorrect');

  if (isCorrect) stats.correct++;
  else { stats.incorrect++; wrongQidsThisRound.add(rq.qid); }

  showFeedback(isCorrect);
  showNextButton();
}

function showFeedback(isCorrect) {
  const card = document.getElementById('activeCard');
  const banner = document.createElement('div');
  banner.className = 'feedback-banner ' + (isCorrect ? 'correct' : 'incorrect');
  banner.textContent = isCorrect ? '✓ Poprawna odpowiedź!' : '✗ Niepoprawna odpowiedź — poprawna zaznaczona powyżej.';
  card.insertBefore(banner, document.getElementById('actionRow'));
}

function showNextButton() {
  const actionRow = document.getElementById('actionRow');
  actionRow.innerHTML = '';
  const btn = document.createElement('button');
  btn.className = 'btn btn-primary';
  const isLast = currentPos === roundQuestions.length - 1;
  btn.textContent = isLast ? 'Zobacz wynik' : 'Następne pytanie →';
  btn.addEventListener('click', nextQuestion);
  actionRow.appendChild(btn);
}

function updateProgressUI() {
  const total = roundQuestions.length;
  const pct = Math.round((currentPos / total) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${currentPos + 1} / ${total}`;
}

// ─────────────────────────────────────────────
// SUMMARY / RETRY POOL
// ─────────────────────────────────────────────
function showSummary() {
  document.getElementById('quizStage').innerHTML = '';
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressLabel').textContent = `${roundQuestions.length} / ${roundQuestions.length}`;

  const total = stats.correct + stats.incorrect;
  const pct = total ? Math.round((stats.correct / total) * 100) : 0;
  document.getElementById('scoreNum').textContent = pct + '%';
  document.getElementById('correctCount').textContent = stats.correct;
  document.getElementById('incorrectCount').textContent = stats.incorrect;
  document.getElementById('resultLabel').textContent = mode === 'retry' ? 'wynik powtórki' : 'wynik końcowy';

  wrongQids = new Set(wrongQidsThisRound); // pula = pytania błędne w TEJ rundzie

  const retryWrap = document.getElementById('retryWrap');
  retryWrap.innerHTML = '';

  if (wrongQids.size > 0) {
    const btn = document.createElement('button');
    btn.className = 'btn btn-primary btn-block';
    btn.style.marginBottom = '0.75rem';
    btn.textContent = `Powtórz błędne pytania (${wrongQids.size})`;
    btn.addEventListener('click', () => startRound([...wrongQids], 'retry'));
    retryWrap.appendChild(btn);
  } else if (mode === 'retry') {
    const msg = document.createElement('div');
    msg.className = 'retry-msg';
    msg.textContent = '🎉 Wszystkie powtórzone pytania poprawne!';
    retryWrap.appendChild(msg);
  }

  document.getElementById('result-section').classList.add('visible');
  document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  restartAll();

  document.getElementById('restartBtn').addEventListener('click', restartAll);
  document.getElementById('resetBtn2').addEventListener('click', restartAll);

  const scrollBtn = document.getElementById('scrolltop');
  window.addEventListener('scroll', () => {
    scrollBtn.classList.toggle('visible', window.scrollY > 400);
  });
  scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
});
</script>
</body>
